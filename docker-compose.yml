version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brewhub_api
    ports:
      - "${PORT:-3001}:3001"
    env_file: .env
    environment:
      CONN_URL: mongodb://mongo:27017
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - brewhub_net

  mongo:
    image: mongo:7-jammy
    container_name: brewhub_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - brewhub_net

  redis:
    image: redis:7-alpine
    container_name: brewhub_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - brewhub_net

volumes:
  mongo_data:
  redis_data:

networks:
  brewhub_net:
    driver: bridge
